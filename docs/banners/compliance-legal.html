<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>06 · Compliance & Legal — Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{
      width:100%;height:100%;overflow:hidden;
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    body{
      background:linear-gradient(135deg,#0F172A 0%,#1E1B4B 100%);
      position:relative;
    }
    canvas{position:absolute;inset:0;z-index:1}
    .gradient-top{
      position:absolute;inset:0;z-index:2;
      background:linear-gradient(180deg,rgba(0,0,0,0.12) 0%,transparent 35%,transparent 65%,rgba(0,0,0,0.15) 100%);
      pointer-events:none;
    }
    .content{
      position:relative;z-index:3;
      display:flex;align-items:center;
      height:100%;padding:0 5.5%;
      pointer-events:none;
    }
    .text-block{display:flex;flex-direction:column;gap:0.3vw}
    .space-number{
      font-size:clamp(42px,6.5vw,92px);font-weight:900;
      color:white;letter-spacing:-0.04em;line-height:1;
      opacity:0.95;
      text-shadow:0 4px 40px rgba(0,0,0,0.12);
    }
    .divider{
      width:clamp(28px,4vw,60px);height:3px;
      background:rgba(255,255,255,0.5);
      border-radius:2px;margin:clamp(3px,.5vw,8px) 0;
    }
    .space-title{
      font-size:clamp(18px,2.6vw,38px);font-weight:700;
      color:white;letter-spacing:-0.02em;line-height:1.2;
      text-shadow:0 2px 24px rgba(0,0,0,0.1);
    }
    .space-subtitle{
      font-size:clamp(10px,1.1vw,16px);font-weight:500;
      color:rgba(255,255,255,0.6);letter-spacing:0.01em;
      margin-top:clamp(1px,.2vw,3px);
    }
    .icon-deco{
      position:absolute;
      right:8%;top:50%;transform:translateY(-50%);
      width:clamp(80px,12vw,180px);height:clamp(80px,12vw,180px);
      opacity:0.13;z-index:3;pointer-events:none;
    }
    .logo-watermark{
      position:absolute;
      bottom:clamp(10px,1.8vw,28px);
      right:clamp(14px,2.2vw,40px);
      width:clamp(36px,5.5vw,80px);
      opacity:0.1;z-index:3;pointer-events:none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="gradient-top"></div>
  <div class="content">
    <div class="text-block">
      <div class="space-number">06</div>
      <div class="divider"></div>
      <div class="space-title">Compliance & Legal</div>
      <div class="space-subtitle">NDA, AML, data privacy</div>
    </div>
  </div>
  <div class="icon-deco"><svg viewBox="0 0 64 64" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M32 8L10 20v16c0 12 9 22 22 27 13-5 22-15 22-27V20L32 8z" opacity=".65"/><path d="M22 34l8 8 14-16" opacity=".8" stroke-width="2.5"/></svg></div>
  <div class="logo-watermark"><svg viewBox="0 0 160 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.17 7.58L5.4 24.28C-1.78 31.43-1.8 43.02 5.35 50.2L35.75 80.7C60.16 105.18 99.89 105.26 124.38 80.87L153.86 51.51C161.06 44.34 161.06 32.71 153.86 25.54L135.3 7.06C127.84-0.37 115.75-0.37 108.3 7.06L78.01 37.22L48.25 7.58C41.05 0.41 29.37 0.41 22.17 7.58Z" fill="white"/><path d="M152.94 47.62C120.35 64.63 89.86 48.44 78.01 37.22L109.37 5.75C116.38-1.28 127.81-1.21 134.74 5.89L155.12 26.79C161.29 33.11 160.78 43.53 152.94 47.62Z" fill="rgba(255,255,255,0.55)"/></svg></div>

  <script>
  (function(){
    var c=document.getElementById('c'),x=c.getContext('2d');
    var dpr=window.devicePixelRatio||1,w,h,t=12.50;
    var R1=15,G1=23,B1=42;
    var R2=67,G2=56,B2=202;

    function resize(){
      w=window.innerWidth;h=window.innerHeight;
      c.width=w*dpr;c.height=h*dpr;
      c.style.width=w+'px';c.style.height=h+'px';
      x.setTransform(dpr,0,0,dpr,0,0);
    }

    function draw(){
      x.clearRect(0,0,w,h);
      var n=38,cy=h*0.48;

      for(var i=0;i<n;i++){
        var p=i/n;
        var r=Math.floor(R1+p*(R2-R1));
        var g=Math.floor(G1+p*(G2-G1));
        var b=Math.floor(B1+p*(B2-B1));
        var a=(0.06+p*0.24).toFixed(3);

        x.beginPath();
        x.strokeStyle='rgba('+r+','+g+','+b+','+a+')';
        x.lineWidth=1.3;

        for(var px=0;px<=w;px+=3){
          var xN=px/w;
          var y=cy
            +Math.sin(xN*Math.PI*2.5+t*0.6+i*0.22)*(28+i*2.2)
            +Math.sin(xN*Math.PI*5+t*0.3+i*0.13)*(14+i*0.7)
            +Math.cos(xN*Math.PI*1.8+t*0.2)*20
            +(i-n/2)*4.8;
          if(px===0)x.moveTo(px,y);else x.lineTo(px,y);
        }
        x.stroke();
      }

      for(var gl=0;gl<3;gl++){
        x.beginPath();
        x.strokeStyle='rgba(79, 70, 229, 0.4)';
        x.lineWidth=2;
        x.shadowColor='rgba(79, 70, 229, 0.55)';
        x.shadowBlur=14;
        var off=gl*12;
        for(var px=0;px<=w;px+=3){
          var xN=px/w;
          var y=cy
            +Math.sin(xN*Math.PI*3+t*0.5+off)*65
            +Math.cos(xN*Math.PI*2+t*0.3+off*0.5)*35;
          if(px===0)x.moveTo(px,y);else x.lineTo(px,y);
        }
        x.stroke();
        x.shadowBlur=0;
      }

      t+=0.005;
      requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener('resize',resize);
    draw();
  })();
  </script>
</body>
</html>
